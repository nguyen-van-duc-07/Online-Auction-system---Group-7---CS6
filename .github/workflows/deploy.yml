name: Auto Deploy to Azure VM

on:
  push:
    branches:
      - develop  # Lắng nghe sự kiện push lên nhánh develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            echo "==========================================="
            echo "BẮT ĐẦU QUÁ TRÌNH TỰ ĐỘNG DEPLOY..."
            echo "==========================================="
            
            # 1. Di chuyển vào thư mục dự án trên máy ảo
            cd ~/Online-Auction-system---Group-7---CS6
            
            # 2. Cập nhật code mới nhất từ nhánh develop
            git checkout develop
            git pull origin develop
            
            # 3. Cấp quyền chạy file mvnw
            chmod +x mvnw
            
            # 4. Build lại dự án Java sang file .jar mới nhất
            ./mvnw clean package -DskipTests
            
            # 5. Tắt tiến trình server cũ đang chạy ngầm (Hệ thống tự vệ thông minh)
            echo "Stopping existing server..."
            if command -v lsof >/dev/null 2>&1; then
            kill -9 $(lsof -t -i:8080) || true
            else
            pgrep -f "Auction_server-.*jar" | grep -v "$$" | xargs kill -9 || true
            fi
            
            # 6. Khởi động lại Server ngầm với file jar mới build
            echo "Starting new server..."
            nohup java -jar Auction_server/target/Auction_server-*-jar-with-dependencies.jar > Auction_server/target/server.log 2>&1 &
            
            echo "==========================================="
            echo "DEPLOY THÀNH CÔNG!"
            echo "==========================================="