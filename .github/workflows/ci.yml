name: Java Maven CI

on:
  push:
    # Cho phép chạy trên tất cả các nhánh
    branches: [ "**" ]
  pull_request:
    # Cho phép chạy trên tất cả các nhánh
    branches: [ "**" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules with Maven
        run: mvn clean package -DskipTests

      - name: Run all tests
        run: mvn test

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: auction-system-build
          path: |
            Auction_server/target/*.jar
            Auction_client/target/*.jar
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/target/surefire-reports/*.xml'
          check_name: 'Test Results'

      - name: Comment PR on success
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build & Tests Passed!**\n\n- ✅ All modules compiled successfully\n- ✅ All unit tests passed\n- ✅ Code quality verified\n\nReady to merge!'
            })

      - name: Comment PR on failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Build or Tests Failed!**\n\nPlease check the workflow logs above for details.'
            })